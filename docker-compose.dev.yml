services:
  app:
    build:
      context: .
    image: trip-hub-app:latest
    container_name: trip-hub-app-dev
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    container_name: trip-hub-caddy-dev
    depends_on:
      - app
    ports:
      - "${DEV_HTTP_PORT:-5000}:80"
    volumes:
      - ./deploy/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
