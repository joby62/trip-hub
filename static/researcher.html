<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>访谈发起者工作台</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="theme-researcher">
  <div class="bg-blur a"></div>
  <div class="bg-blur b"></div>

  <main class="shell">
    <header class="top-card glass">
      <div>
        <p class="kicker">Researcher Console</p>
        <h1>数字学习自传访谈平台</h1>
        <p class="sub">上传邀请函，自动生成分阶段访谈；跟踪受访者进度；导出对话与总结。</p>
      </div>
      <div class="user-bar" id="userBar">
        <span id="userEmail">未登录</span>
        <button class="btn ghost" id="logoutBtn">退出</button>
      </div>
    </header>

    <section class="auth-card glass" id="authCard">
      <h2>发起者登录</h2>
      <div class="grid-2">
        <label>邮箱
          <input class="field" id="authEmail" type="email" placeholder="name@example.com" />
        </label>
        <label>密码
          <input class="field" id="authPassword" type="password" placeholder="至少8位" />
        </label>
      </div>
      <div class="actions">
        <button class="btn primary" id="loginBtn">登录</button>
        <button class="btn ghost" id="registerBtn">注册</button>
      </div>
      <p class="status" id="authStatus"></p>
    </section>

    <section class="workspace" id="workspace">
      <article class="panel glass">
        <h3>界面关系与快速入口</h3>
        <p class="sub">研究者界面用于建项目、看会话、导出数据；受访者界面用于填写访谈。你可以直接打开以下入口验证流程。</p>
        <div class="actions">
          <a class="btn ghost" id="quickParticipantBtn" href="/participant-direct" target="_blank" rel="noopener">打开受访者界面（新版）</a>
          <a class="btn ghost" id="quickLegacyBtn" href="/legacy" target="_blank" rel="noopener">打开受访者界面（旧版）</a>
        </div>
        <p class="status" id="quickLinkStatus"></p>
      </article>

      <article class="panel glass">
        <h3>创建新访谈项目</h3>
        <label>项目标题
          <input class="field" id="projectTitle" type="text" placeholder="如：高校青年数字学习实践访谈" />
        </label>
        <label>邀请函内容
          <textarea class="field" id="invitationText" rows="9" placeholder="粘贴 readme 或正式邀请函全文"></textarea>
        </label>
        <div class="actions">
          <button class="btn primary" id="createProjectBtn">生成访谈模板并创建项目</button>
        </div>
        <p class="status" id="projectStatus"></p>
      </article>

      <article class="panel glass">
        <h3>我的项目</h3>
        <div class="project-list" id="projectList"></div>
      </article>

      <article class="panel glass" id="projectDetailPanel">
        <h3>项目详情</h3>
        <div id="projectDetailEmpty" class="empty">请选择左侧项目</div>
        <div id="projectDetail" class="hidden">
          <p><strong id="detailTitle">-</strong></p>
          <p>受访链接：<a id="inviteLink" href="#" target="_blank" rel="noopener">-</a></p>
          <p class="sub" id="templateOpening"></p>

          <h4>受访会话</h4>
          <div class="session-list" id="sessionList"></div>
        </div>
      </article>

      <article class="panel glass" id="sessionPanel">
        <h3>会话内容</h3>
        <div id="sessionEmpty" class="empty">请选择会话</div>
        <div id="sessionDetail" class="hidden">
          <div class="session-head">
            <span id="sessionStage"></span>
            <div class="actions">
              <button class="btn ghost" id="exportJsonBtn">导出 JSON</button>
              <button class="btn ghost" id="exportTxtBtn">导出 TXT</button>
            </div>
          </div>
          <pre class="summary-box" id="sessionSummary">暂无总结</pre>
          <div class="transcript" id="transcript"></div>
        </div>
      </article>
    </section>
  </main>

  <script src="/static/researcher.js" defer></script>
</body>
</html>
